<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinSight</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <header>
    <h1>FinSight</h1>
    <p>Dashboard de análise de carteiras de investimentos</p>
  </header>

  <main>

    <!-- Seletor de ativo e período -->
    <section class="controls">
      <div class="autocomplete-wrapper">
        <div class="autocomplete-selected" id="autocomplete-selected">
            <img id="selected-logo" class="autocomplete-logo hidden" />
            <span id="selected-name">Selecione um ativo...</span>
        </div>
        
        <input 
            type="text" 
             id="search-input" 
            class="search-input hidden" 
            placeholder="Buscar por nome ou ticker..."
            autocomplete="off"
           />
         <ul id="autocomplete-list" class="autocomplete-list hidden"></ul>
      </div>

      <button id="compare-btn">+ Comparar</button>

      <div class="period-buttons">
        <button class="period-btn active" data-period="1y">1A</button>
        <button class="period-btn" data-period="6m">6M</button>
        <button class="period-btn" data-period="3m">3M</button>
      </div>
      <button id="refresh-btn">Atualizar dados</button>
    </section>

    <section class="comparison-bar" id="comparison-bar">
        <span class="comparison-label">Comparando:</span>
        <div id="comparison-chips"></div>
        <button id="clear-comparison">Limpar</button>
    </section>

    <!-- Loading -->
    <div id="loading" class="hidden">Carregando dados...</div>

    <div class="asset-header" id="asset-header"></div>

    <!-- Cards de indicadores -->
    <section class="cards" id="cards">
      <div class="card" id="card-return">
        <span class="card-label">Retorno Acumulado</span>
        <span class="card-value" id="val-return">--</span>
      </div>
      <div class="card" id="card-volatility">
        <span class="card-label">Volatilidade</span>
        <span class="card-value" id="val-volatility">--</span>
      </div>
      <div class="card" id="card-drawdown">
        <span class="card-label">Drawdown Máximo</span>
        <span class="card-value" id="val-drawdown">--</span>
      </div>
      <div class="card" id="card-sharpe">
        <span class="card-label">Sharpe Ratio</span>
        <span class="card-value" id="val-sharpe">--</span>
      </div>
    </section>

    <!-- Gráfico -->
    <section class="chart-container">
      <canvas id="price-chart"></canvas>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
